version: "3"

tasks:
  build:os:
    desc: Build NixOS configuration
    cmds:
      - nixos-rebuild build --flake .

  build:hm:
    desc: Build home-manager configuration
    deps: [check:nvidia]
    cmds:
      - home-manager build --impure --flake .

  rebuild:
    desc: Rebuild NixOS configuration and switch to it
    cmds:
      - sudo nixos-rebuild switch --flake .

  switch:
    desc: Switch home-manager configuration
    cmds:
      - home-manager switch --impure --flake .

  update:
    desc: Update nix flake inputs
    cmds:
      - nix flake update

  fmt:
    desc: Format all nix files
    cmds:
      - nixfmt ./**/*.nix

  dev:
    cmds:
      - nix develop

  news:
    desc: Show home-manager news
    cmds:
      - home-manager news --flake .

  diff:hm:
    desc: Show diff between current and new home-manager configuration
    cmds:
      - nvd diff ~/.local/state/nix/profiles/home-manager result

  daily:
    desc: Update flake inputs, format nix files, commit and push changes, switch home-manager config, and clean old generations
    cmds:
      - task: update
      - task: fmt
      - task: build:hm
      - task: diff:hm
      - git add flake.lock
      - 'git commit -m "build: update lock file"'
      - git push
      - task: switch
      - task: clean

  check:nvidia:
    desc: Check if the NVIDIA driver version in home.nix matches the installed driver
    cmds:
      - |
        host=$(hostname)
        home_nix="hosts/${host}/home.nix"
        installed=$(nvidia-smi --query-gpu=driver_version --format=csv,noheader 2>/dev/null | head -1)
        if [ -z "$installed" ]; then
          echo "NVIDIA driver not found on this host, skipping check."
          exit 0
        fi
        if [ ! -f "$home_nix" ]; then
          echo "No home.nix found for host '${host}', skipping check."
          exit 0
        fi
        configured=$(grep -oP '(?<=version = ")[^"]+' "$home_nix")
        if [ -z "$configured" ]; then
          echo "No NVIDIA version configured in ${home_nix}, skipping check."
          exit 0
        fi
        echo "Configured: $configured"
        echo "Installed:  $installed"
        if [ "$configured" != "$installed" ]; then
          echo ""
          echo "WARNING: Driver version mismatch! Update ${home_nix}."
          exit 1
        else
          echo "OK: versions match."
        fi

  nvidia:prefetch:
    desc: Fetch sha256 hash for a given NVIDIA driver version
    summary: |
      Usage: task nvidia:prefetch VERSION=580.95.05
    vars:
      URL: https://download.nvidia.com/XFree86/Linux-x86_64/{{.VERSION}}/NVIDIA-Linux-x86_64-{{.VERSION}}.run
    cmds:
      - nix store prefetch-file {{.URL}}
    requires:
      vars: [VERSION]

  clean:
    desc: Clean old generations and garbage collect nix store
    cmds:
      - home-manager expire-generations "-14 days"
      - nix store gc -v --log-format bar-with-logs
